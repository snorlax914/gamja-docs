services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc-rag-qdrant
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  paddleocr-vl:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu
    container_name: doc-rag-paddleocr-vl
    command: >
      paddleocr genai_server
      --model_name PaddleOCR-VL-1.5-0.9B
      --host 0.0.0.0
      --port 8118
      --backend vllm
      --backend_config /cfg/vllm.yaml
    ports:
      - "8118:8118"
    volumes:
      - ./paddleocr-vllm.yaml:/cfg/vllm.yaml:ro
      - paddleocr_hf_cache:/root/.cache/huggingface   # 모델 가중치 캐시 (재시작 시 재다운로드 방지)
      - paddleocr_models:/root/.paddlex               # PaddleOCR 파이프라인 모델 캐시
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  paddleocr_hf_cache:
  paddleocr_models:
